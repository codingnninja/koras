<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>HTML + CSS</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/tailwindcss/dist/tailwind.min.css"
    />
  </head>
  <body>
    <div id="root" class="flex items-center justify-center h-screen"></div>
    <script type="module">
      import {
        $render,
        $register,
        $select,
      } from "https://cdn.jsdelivr.net/npm/@codingnninja/render/dist/esm/render.min.js";

      function SimpleScreeRecorder(isStreaming = false) {
        let mediaRecorder;
        let recordedChunks = [];

        async function startCapture() {
          navigator.mediaDevices
            .getDisplayMedia({ video: { mediaSource: "screen" }, audio: true })
            .then((stream) => {
              const mediaRecorder = new MediaRecorder(stream);
              globalThis.mediaRecorder = mediaRecorder;
              let video;
              const videoo = $select("#screenRecordingo");
              videoo.srcObject = stream;
              mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                  video = [event.data];
                  globalThis.myvideo = video;
                }
              };

              mediaRecorder.onstop = (event) => {
                const blob = new Blob(globalThis.myvideo, {
                  type: "video/webm",
                });
                const url = window.URL.createObjectURL(blob);

                const a = document.createElement("a");
                document.body.appendChild(a);
                a.style = "display: none";
                a.href = url;
                a.download = "webcam-video.webm";
                a.click();
                window.URL.revokeObjectURL(url);
              };
              mediaRecorder.start();
            })
            .catch((error) => {
              console.error("Error accessing camera:", error);
              $select("#camera[remove|class=hidden]");
            });
        }

        function stopCapture() {
          mediaRecorder.stop();
        }

        return `
          <div id="screenRecording">
            <video controls autoplay muted type="video/webm" id="screenRecordingo">
            </video>
            <button class="bg-red-400 hover:opacity-80 text-white font-bold py-2 px-4 rounded" type="button" onclick="${startCapture()}"> Start recording </button>
            <button class="bg-red-400 hover:opacity-80 text-white font-bold py-2 px-4 m-3 rounded" type="button" onclick="${stopCapture()}"> Stop & save </button>
          </div>
        `;
      }

      $register(SimpleScreeRecorder);
      $render(SimpleScreeRecorder);
    </script>
  </body>
</html>
