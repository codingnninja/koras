<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module">
      import { $select } from "https://cdn.jsdelivr.net/npm/@codingnninja/render/dist/esm/render.min.js";
    </script>
  </head>
  <body>
    <div style="display: flex; height: 300px; align-items: center; justify-content: center;">
        <button type="button" onclick="$select('#counter[add|textContent+=1]')">
        Increase
        <span id="counter">0</span>
        </button>
    </div>
  </body>
</html>
